services:
  frontend:
    build: frontend
    image: tulip-frontend:latest
    restart: unless-stopped
    ports:
      - "3030:3030"
    depends_on:
      - mongo
      - api
    environment:
      API_SERVER_ENDPOINT: http://api:5000/
      TULIP_AUTH_USERNAME: ${TULIP_AUTH_USERNAME}
      TULIP_AUTH_PASSWORD_HASH: ${TULIP_AUTH_PASSWORD_HASH}

  api:
    build:
      context: services/
      target: api
    restart: unless-stopped
    depends_on:
      - mongo

    volumes:
      - ${TRAFFIC_DIR}:/traffic:ro
    environment:
      TULIP_MONGO: mongo:27017
      TULIP_TRAFFIC_DIR: /traffic
      FLAG_REGEX: ${FLAG_REGEX}
      TICK_START: ${TICK_START}
      TICK_LENGTH: ${TICK_LENGTH}
      VM_IP: ${VM_IP}
      GAME_SERVICES: ${GAME_SERVICES}

  assembler:
    build:
      context: services/
      target: assembler
    volumes:
      - ${TRAFFIC_DIR}:/traffic:ro
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      TULIP_WATCH_DIR: /traffic
      TULIP_MONGO: mongo:27017
      TULIP_FLAG: ${FLAG_REGEX}
      TULIP_FLUSH_INTERVAL: ${ASSEMBLER_FLUSH_INTERVAL}
      TULIP_CONNECTION_TIMEOUT: ${ASSEMBLER_CONNECTION_TIMEOUT}
      TULIP_TCP_LAZY: ${ASSEMBLER_TCP_LAZY}
      TULIP_EXPERIMENTAL: ${ASSEMBLER_EXPERIMENTAL}
      TULIP_NONSTRICT: ${ASSEMBLER_NONSTRICT}

  ingestor:
    build:
      context: services/
      target: ingestor
    restart: unless-stopped
    ports:
      - "${INGESTOR_ADDR}:9999"
    volumes:
      - ${TRAFFIC_DIR}:/traffic
    environment:
      TULIP_DEST_DIR: /traffic
      TULIP_ROTATE_INTERVAL: "${INGESTOR_ROTATE}"

  # This profile is enabled by remote_setup.py. It executes tcpdump on the
  # remote host over SSH and forwards its stdout to the local ingestor over
  # the private Compose network. No Tulip service runs on the remote host and
  # the ingestor does not need to be exposed outside this machine.
  remote-capture:
    profiles: ["remote"]
    build:
      context: services/
      target: remote-capture
    restart: unless-stopped
    depends_on:
      - ingestor
    environment:
      REMOTE_SSH_HOST: ${REMOTE_SSH_HOST:-}
      REMOTE_SSH_PORT: ${REMOTE_SSH_PORT:-22}
      REMOTE_SSH_USER: ${REMOTE_SSH_USER:-}
      REMOTE_SSH_AUTH: ${REMOTE_SSH_AUTH:-password}
      REMOTE_SSH_IDENTITY_FILE: ${REMOTE_SSH_IDENTITY_FILE:-/root/.ssh/id_remote}
      REMOTE_SSH_PASSWORD_FILE: ${REMOTE_SSH_PASSWORD_FILE:-/root/.ssh/password}
      REMOTE_CAPTURE_INTERFACE: ${REMOTE_CAPTURE_INTERFACE:-}
      REMOTE_CAPTURE_FILTER: ${REMOTE_CAPTURE_FILTER:-}
      REMOTE_CAPTURE_SNAPLEN: ${REMOTE_CAPTURE_SNAPLEN:-0}
      REMOTE_CAPTURE_USE_SUDO: ${REMOTE_CAPTURE_USE_SUDO:-true}
    volumes:
      - ${REMOTE_SSH_DIR:-./.tulip/ssh}:/root/.ssh:ro

  enricher:
    build:
      context: services/
      target: enricher
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      TULIP_MONGO: mongo:27017
      TULIP_REDIS: redis://redis:6379

  # MCP service disabled - not needed
  # mcp:
  #   build:
  #     context: services/
  #     target: mcp
  #   restart: unless-stopped
  #   depends_on:
  #     - mongo
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     MONGO_HOST: mongo:27017

  suricata:
    build: services/suricata
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - ./suricata.rules:/var/lib/suricata/rules/suricata.rules:ro
      - ${TRAFFIC_DIR}:/traffic:ro
    environment:
      WATCH_DIR: /traffic
      REDIS_HOST: redis
      REDIS_PORT: 6379

    tty: true

  redis:
    hostname: redis
    image: redis:8
    restart: unless-stopped

  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017" # Only expose to localhost
    volumes:
      - mongo_data:/data/db

  flagid:
    build:
      context: services/flagid
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/
      FLAGID_DB: pcap
      FLAGID_COLLECTION: flagids
      FLAGID_URL: ${FLAGID_URL}
      FLAGID_FETCH_INTERVAL: 60

volumes:
  mongo_data:
